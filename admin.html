<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ads Eran MM - Admin Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        :root { --bg: #0b1120; --panel: #1e293b; --primary: #3b82f6; --accent: #10b981; --text: #f8fafc; --muted: #94a3b8; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .header h2 { margin: 0; color: #fbbf24; display: flex; align-items: center; gap: 10px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--panel); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); border-left: 4px solid var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .stat-card h3 { margin: 0 0 10px 0; font-size: 14px; color: var(--muted); text-transform: uppercase; }
        .stat-card h1 { margin: 0 0 15px 0; font-size: 30px; color: var(--text); }
        
        .rate-input { display: flex; gap: 10px; }
        .rate-input input { flex: 1; padding: 10px; border: 1px solid #334155; border-radius: 8px; background: rgba(0,0,0,0.2); color: white; outline: none; }
        .rate-input button { padding: 10px 20px; background: linear-gradient(135deg, #f59e0b, #d97706); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .rate-input button:hover { opacity: 0.9; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 12px 25px; background: rgba(0,0,0,0.2); border: 1px solid #334155; border-radius: 10px; cursor: pointer; font-weight: bold; color: var(--muted); transition: 0.3s; }
        .tab-btn.active { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; border-color: #3b82f6; }
        
        .panel { background: var(--panel); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); display: none; overflow-x: auto;}
        .panel.active { display: block; }
        
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: left; }
        th { color: var(--muted); font-size: 12px; text-transform: uppercase; }
        td { font-size: 14px; }
        
        .btn-done, .btn-reject { border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.3s;}
        .btn-done { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .btn-reject { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); margin-left: 5px;}
        .btn-done:hover { background: #10b981; color: white; }
        .btn-reject:hover { background: #ef4444; color: white; }
        
        .badge { padding: 5px 10px; border-radius: 8px; font-size: 11px; font-weight: bold; }
        .badge.pending { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .badge.paid { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .badge.rejected { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2><i class="fas fa-user-shield"></i> Ads Eran Pro - Admin</h2>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3><i class="fas fa-users"></i> Total Users</h3>
                <h1 id="totalUsers">0</h1>
            </div>
            <div class="stat-card" style="border-left-color: #f59e0b;">
                <h3><i class="fas fa-exchange-alt"></i> Rate (10k Coins)</h3>
                <h1 id="currentRate" style="color:#f59e0b;">0 Ks</h1>
                <div class="rate-input">
                    <input type="number" id="newRateInput" placeholder="New Ks Amount">
                    <button onclick="updateRate()">Update</button>
                </div>
            </div>
            <div class="stat-card" style="border-left-color: #10b981;">
                <h3><i class="fas fa-clock"></i> Pending Withdrawals</h3>
                <h1 id="pendingWd" style="color:#10b981;">0</h1>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchAdminTab('withdrawals', this)"><i class="fas fa-money-bill-wave"></i> Withdrawals</button>
            <button class="tab-btn" onclick="switchAdminTab('users', this)"><i class="fas fa-users-cog"></i> User Management</button>
        </div>

        <div id="withdrawals" class="panel active">
            <table>
                <thead><tr><th>Date</th><th>User</th><th>Method</th><th>Account Info</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody id="wdTableBody"></tbody>
            </table>
        </div>

        <div id="users" class="panel">
            <table>
                <thead><tr><th>User Info</th><th>Coins Balance</th><th>Total Invited</th><th>Active Refers</th><th>Active Miners</th></tr></thead>
                <tbody id="usersTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyDUVFWArTj373R1AZLx5gj1uaRF2nokBf8",
            authDomain: "ads-eran-mm-fb1ce.firebaseapp.com",
            databaseURL: "https://ads-eran-mm-fb1ce-default-rtdb.firebaseio.com",
            projectId: "ads-eran-mm-fb1ce",
            storageBucket: "ads-eran-mm-fb1ce.firebasestorage.app",
            messagingSenderId: "297690230974",
            appId: "1:297690230974:web:affc82ace1a52fa86b2eef"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const BOT_TOKEN = "8607411314:AAFcHrlEn7Y9KJVY3UkfAiOhpg4Nz6mwg0E";

        function sendTgMsg(chatId, text) {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: chatId, text: text})
            });
        }

        // --- REALTIME DATA LISTENER ---
        db.ref().on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) return;
            
            document.getElementById('currentRate').innerText = (data.settings?.exchangeRate || 5000) + " Ks";
            document.getElementById('totalUsers').innerText = Object.keys(data.users || {}).length;

            // --- USERS TABLE ---
            const usersTbody = document.getElementById('usersTableBody');
            usersTbody.innerHTML = "";
            for(let id in data.users) {
                const u = data.users[id];
                let miners = [];
                let lvl = parseInt(u.minerLevel) || 0;
                if(lvl >= 1 || u.miners?.Level_1) miners.push("Lvl 1");
                if(lvl >= 2 || u.miners?.Level_2) miners.push("Lvl 2");
                if(lvl >= 3 || u.miners?.Level_3) miners.push("Lvl 3");
                if(lvl >= 4 || u.miners?.VIP) miners.push("VIP");
                
                usersTbody.innerHTML += `
                    <tr>
                        <td><b>${u.name || "User"}</b><br><span style="font-size:11px;color:#94a3b8;">ID: ${id}</span></td>
                        <td style="color:#10b981;font-weight:bold;">${Math.floor(u.coins||0)}</td>
                        <td>${u.invites || 0}</td>
                        <td style="color:#fbbf24;font-weight:bold;">${u.activeRefers || 0} / 3</td>
                        <td>${miners.length > 0 ? miners.join(", ") : "<span style='color:#ef4444;'>None</span>"}</td>
                    </tr>`;
            }

            // --- WITHDRAWALS TABLE ---
            let pendingWdCount = 0;
            const wdTbody = document.getElementById('wdTableBody');
            wdTbody.innerHTML = "";
            
            let wdArray = [];
            for(let id in data.withdrawals) { wdArray.push({id: id, ...data.withdrawals[id]}); }
            wdArray.sort((a,b) => b.time - a.time); // Newest first

            wdArray.forEach(w => {
                if(w.status === "Pending") pendingWdCount++;
                let dateStr = w.time ? new Date(w.time).toLocaleDateString() + " " + new Date(w.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "-";
                
                let actions = w.status === "Pending" ? 
                    `<button class="btn-done" onclick="actionWd('${w.id}', '${w.userId}', 'Paid', '${w.amount}')"><i class="fas fa-check"></i> Pay</button>
                     <button class="btn-reject" onclick="actionWd('${w.id}', '${w.userId}', 'Rejected', '${w.amount}')"><i class="fas fa-times"></i></button>` : "-";
                
                wdTbody.innerHTML += `
                    <tr>
                        <td style="font-size:11px;color:#94a3b8;">${dateStr}</td>
                        <td><b>${w.name}</b><br><span style="font-size:10px;color:#94a3b8;">${w.userId}</span></td>
                        <td><span style="background:rgba(59,130,246,0.1);color:#3b82f6;padding:4px 8px;border-radius:6px;font-size:11px;font-weight:bold;">${w.bank}</span></td>
                        <td><b>${w.accNumber}</b><br><span style="font-size:11px;color:#94a3b8;">${w.accName}</span></td>
                        <td style="color:#f59e0b;font-weight:bold;">${w.amount}</td>
                        <td><span class="badge ${w.status.toLowerCase()}">${w.status}</span></td>
                        <td>${actions}</td>
                    </tr>`;
            });
            document.getElementById('pendingWd').innerText = pendingWdCount;
        });

        // --- UPDATE EXCHANGE RATE ---
        function updateRate() {
            const val = document.getElementById('newRateInput').value;
            if(val) {
                db.ref('settings/exchangeRate').set(parseInt(val));
                alert("Exchange Rate ကို " + val + " Ks သို့ ပြောင်းလဲလိုက်ပါပြီ!");
                document.getElementById('newRateInput').value = "";
            } else {
                alert("ကျေးဇူးပြု၍ ပမာဏ ထည့်ပါ။");
            }
        }

        // --- WITHDRAWAL ACTIONS (Approve / Reject & Refund) ---
        function actionWd(wdId, userId, action, amount) {
            let confirmMsg = action === "Paid" ? "ဒီ ငွေထုတ်ယူမှုကို အတည်ပြု (Pay) မည်မှာ သေချာပါသလား?" : "ဒီ ငွေထုတ်ယူမှုကို ပယ်ချ (Reject) မည်မှာ သေချာပါသလား? User ထံသို့ Coins ပြန်လည်ပေါင်းထည့်ပေးမည်ဖြစ်သည်။";
            
            if(confirm(confirmMsg)) {
                // Update withdrawal status
                db.ref('withdrawals/' + wdId).update({ status: action });
                
                let telegramMsg = "";
                if(action === "Paid") {
                    telegramMsg = `✅ ဂုဏ်ယူပါသည်။ သင့်၏ ငွေထုတ်ယူမှု (${amount} Coins) အောင်မြင်ပါသည်။ ငွေလွှဲပေးလိုက်ပါပြီ။`;
                } else if(action === "Rejected") {
                    telegramMsg = `❌ သင့်၏ ငွေထုတ်ယူမှု (${amount} Coins) ပယ်ဖျက်ခံရပါသည်။ အချက်အလက်များကို ပြန်လည်စစ်ဆေးပါ။ \n(နှုတ်ယူထားသော Coins များ ပြန်လည်ပေါင်းထည့်ပေးထားပါသည်။)`;
                    // Auto Refund Coins to User
                    db.ref('users/' + userId + '/coins').transaction(currentCoins => {
                        return (parseFloat(currentCoins) || 0) + parseFloat(amount);
                    });
                }
                
                // Send Telegram Notification
                sendTgMsg(userId, telegramMsg);
            }
        }

        // --- TAB SWITCHER ---
        function switchAdminTab(tabId, el) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
        }
    </script>
</body>
</html>
